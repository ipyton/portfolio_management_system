spring:
  application:
    name: portfolio-management-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/portfolio?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:StrongRootPass123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    jpa:
      repositories:
        bootstrap-mode: lazy
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: false
  sql:
    init:
      mode: ${SQL_INIT_MODE:always}
      schema-locations: ${SQL_INIT_SCHEMA_LOCATIONS:classpath:schema-mysql.sql}
server:
  port: ${SERVER_PORT:8080}
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
security:
  request-key:
    header-name: ${REQUEST_KEY_HEADER:X-Request-Key}
    value: ${REQUEST_KEY:ef928c10-2da4-4ca6-9b49-dedc912d5b4c}
resilience:
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    max-requests: ${RATE_LIMIT_MAX_REQUESTS:60}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
  degradation:
    enabled: ${DEGRADATION_ENABLED:false}
    allow-path-prefixes: ${DEGRADATION_ALLOW_PATHS:/api/health,/swagger-ui,/v3/api-docs}
    message: ${DEGRADATION_MESSAGE:Service is temporarily degraded. Please try again later.}
springdoc:
  api-docs:
    path: ${SPRINGDOC_API_DOCS_PATH:/v3/api-docs}
  swagger-ui:
    path: ${SPRINGDOC_SWAGGER_UI_PATH:/swagger-ui.html}
    operations-sorter: alpha
    tags-sorter: alpha
scheduler:
  zone: ${SCHEDULER_ZONE:UTC}
  pool:
    size: ${SCHEDULER_POOL_SIZE:4}
    shutdown-await-termination-seconds: ${SCHEDULER_SHUTDOWN_WAIT_SECONDS:30}
  jobs:
    market-data-refresh:
      enabled: ${JOB_MARKET_DATA_REFRESH_ENABLED:true}
      cron: ${JOB_MARKET_DATA_REFRESH_CRON:0 0 22 * * MON-FRI}
    fx-rate-refresh:
      enabled: ${JOB_FX_RATE_REFRESH_ENABLED:true}
      cron: ${JOB_FX_RATE_REFRESH_CRON:0 */5 * * * *}
    portfolio-nav-snapshot:
      enabled: ${JOB_PORTFOLIO_NAV_SNAPSHOT_ENABLED:true}
      cron: ${JOB_PORTFOLIO_NAV_SNAPSHOT_CRON:0 10 22 * * MON-FRI}
    system-config-refresh:
      enabled: ${JOB_SYSTEM_CONFIG_REFRESH_ENABLED:true}
      cron: ${JOB_SYSTEM_CONFIG_REFRESH_CRON:0 0 6 * * MON}
yahoo-finance:
  enabled: ${YAHOO_FINANCE_ENABLED:true}
  base-url: ${YAHOO_FINANCE_BASE_URL:https://query1.finance.yahoo.com}
  timeout: ${YAHOO_FINANCE_TIMEOUT:5s}
  user-agent: ${YAHOO_FINANCE_USER_AGENT:portfolio-management-system/1.0}
finnhub:
  enabled: ${FINNHUB_ENABLED:true}
  base-url: ${FINNHUB_BASE_URL:https://finnhub.io}
  timeout: ${FINNHUB_TIMEOUT:5s}
  api-key: ${FINNHUB_API_KEY:d75nub1r01qk56kdf63gd75nub1r01qk56kdf640}
twelve-data:
  enabled: ${TWELVE_DATA_ENABLED:true}
  base-url: ${TWELVE_DATA_BASE_URL:https://api.twelvedata.com}
  timeout: ${TWELVE_DATA_TIMEOUT:5s}
  api-key: ${TWELVE_DATA_API_KEY:c993f88aa55f41418fc3449756880e99}
eastmoney:
  enabled: ${EASTMONEY_ENABLED:true}
  base-url: ${EASTMONEY_BASE_URL:https://push2his.eastmoney.com}
  timeout: ${EASTMONEY_TIMEOUT:5s}
fx:
  enabled: ${FX_ENABLED:true}
  reporting-currency: ${FX_REPORTING_CURRENCY:CNY}
  persist-history: ${FX_PERSIST_HISTORY:true}
  stale-after: ${FX_STALE_AFTER:30m}
  tracked-currencies: ${FX_TRACKED_CURRENCIES:CNY,USD,HKD}
  symbols:
    USD: ${FX_SYMBOL_USD:USDCNY=X}
    HKD: ${FX_SYMBOL_HKD:HKDCNY=X}
